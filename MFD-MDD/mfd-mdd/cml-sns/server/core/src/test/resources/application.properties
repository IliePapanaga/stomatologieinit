spring.profiles.active=hsqldb-local
spring.datasource.url=jdbc:hsqldb:file:${basedir}/target/test-classes/mdd.db;shutdown=true
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.hsqldb.jdbcDriver
spring.jpa.hibernate.ddl-auto=create

security.basic.enabled=false
spring.jackson.date-format=com.fasterxml.jackson.databind.util.ISO8601DateFormat

spring.http.multipart.max-file-size=500KB

#AWS SES PROPERTIES
aws.ses.access.key=TEST_ACCESS_KEY
aws.ses.secret.key=TEST_SECRET_KEY
aws.ses.region=us-west-2

#AWS SNSPROPERTIES
aws.sns.access.key=TEST_ACCESS_KEY
aws.sns.secret.key=TEST_SECRET_KEY
aws.sns.region=us-west-2

<!DOCTYPE html>
<html lang="en">
<head>
 <link href="css/main.css" rel="stylesheet">

</head>
<body>


<div class="wrapper" id="root">
	<div class="login">
			<div class="login__header"><img src="img/logo.svg"></div>
			<div class="login__main">
				<div class="login__main-item">
					<input class="input__true" type="email" placeholder="Email">
					<div><svg class="input__icon"><use xlink:href="#email"></use></svg></div>
				</div>

				<div class="login__main-item">
					<input class="input__false" type="password" placeholder="Password">
					<div><svg class="input__icon"><use xlink:href="#Password"></use></svg></div>
				</div>
				<div class="login__main-text">

				<div class="login__main-text-item">
					<input type="checkbox" name="check" id="check">
					<label for="check">Remember me</label>
				</div>
				<div class="login__main-text-item">
					<a href="#">Forgot password?</a>
				</div>
				</div>
			</div>
			<div class="login__footer">
				<div class="login__footer-btn">
					<button>Log in</button>
				</div>
				<div class="login__footer-link">
					<p>Don’t have an account?<a class="login__signup-link modal__window">Sign Up</a></p>
				</div>
			</div>
		</div>
	<div class="logo__absolute">
		<img src="img/logo-abs.png">
	</div>

<div class="modal__gray" style="width: 640px; height: 820px">

    <div class="modal__header">
        <div class="modal__header-icon">
            <div>
                <svg class="close__icon">
                    <use xlink:href="#Close"></use>
                </svg>
            </div>
        </div>
        <h2>Add/Edit Location</h2>
    </div>

    <div class="location__main">
        <div class="location__main-item">
            <div class="item__box">
                <div class="text">
                    <p>Location Name*:</p>
                </div>
                <div class="input">
                    <input>
                </div>
            </div>
            <div class="item__box">
                <div class="text">
                    <p>Operating Hours:</p>
                </div>
                <div class="input input__time-wrapper">
                    <div class="input__time">
                        <input class="board__input board__input-time" type="time" value="00:00">
                        <div class="time__edit">
                            <div class="time__edit-content">


                                <div class="time__edit-item">
                                    <button class="time__top"><p>&#9650;</p></button>
                                    <div>03</div>
                                    <button class="time__bottom"><p>&#9660;</p></button>
                                </div>
                                <div class="time__edit-item-dots">:</div>
                                <div class="time__edit-item">
                                    <button class="time__top"><p>&#9650;</p></button>
                                    <div>03</div>
                                    <button class="time__bottom"><p>&#9660;</p></button>
                                </div>
                                <div class="time__edit-item time__edit-item-meridiem">
                                    <button class="time__top"><p>&#9650;</p></button>
                                    <div>AM</div>
                                    <button class="time__bottom"><p>&#9660;</p></button>
                                </div>
                            </div>
                            <div class="time__edit-btn">
                                <button>Ok</button>

                            </div>
                        </div>
                    </div>

                    <div class="input__time">
                        <input class="board__input board__input-time" type="time" value="00:00">
                        <div class="time__edit">
                            <div class="time__edit-content">


                                <div class="time__edit-item">
                                    <button class="time__top"><p>&#9650;</p></button>
                                    <div>03</div>
                                    <button class="time__bottom"><p>&#9660;</p></button>
                                </div>
                                <div class="time__edit-item-dots">:</div>
                                <div class="time__edit-item">
                                    <button class="time__top"><p>&#9650;</p></button>
                                    <div>03</div>
                                    <button class="time__bottom"><p>&#9660;</p></button>
                                </div>
                                <div class="time__edit-item time__edit-item-meridiem">
                                    <button class="time__top"><p>&#9650;</p></button>
                                    <div>AM</div>
                                    <button class="time__bottom"><p>&#9660;</p></button>
                                </div>
                            </div>
                            <div class="time__edit-btn">
                                <button>Ok</button>

                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="location__main-item">
            <h3>Administrator Info</h3>
            <div class="item__box">
                <div class="text">
                    <p>First Name*:</p>
                </div>
                <div class="input">
                    <input>
                </div>
            </div>

            <div class="item__box">
                <div class="text">
                    <p>Last Name*:</p>
                </div>
                <div class="input">
                    <input>
                </div>
            </div>

            <div class="item__box">
                <div class="text">
                    <p>Notification Email*:</p>
                </div>
                <div class="input">
                    <input>
                </div>
            </div>

            <div class="item__box">
                <div class="text">
                    <p>Lcoation Phone*:</p>
                </div>
                <div class="input">
                    <input>
                </div>
            </div>
        </div>


        <div class="location__main-item">
            <h3>Address Details</h3>
            <div class="item__box">
                <div class="text">
                    <p>Street*:</p>
                </div>
                <div class="input">
                    <input>
                </div>
            </div>

            <div class="item__box">
                <div class="text">
                    <p>City*:</p>
                </div>
                <div class="input">
                    <input>
                </div>
            </div>

            <div class="item__box">
                <div class="text">
                    <p>State*:</p>
                </div>
                <div class="input board__input-wrapper">
                    <select required class="board__input">
                        <option value="" disabled selected hidden>Select</option>
                        <option>1</option>
                        <option>2</option>
                    </select>
                </div>
            </div>

            <div class="item__box">
                <div class="text">
                    <p>ZIP*:</p>
                </div>
                <div class="input">
                    <input>
                </div>
            </div>

            <div class="location__help">
                <p class="mandatory">Fields marked* are mandatory</p>
            </div>

        </div>
    </div>


    <div class="footer__btn">
        <button class="blue white">Cancel</button>
        <button class="blue">Ok</button>
    </div>
</div>
